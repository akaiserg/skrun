name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm test
      - name: Publish (dist-tag = beta for prerelease tags, else latest)
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta* ]]; then
            npm publish --tag beta --provenance
          else
            npm publish --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
